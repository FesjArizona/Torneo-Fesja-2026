<table class="table table-hover">
  <thead>
    <tr>
      <th scope="col">Team</th>
      <th scope="col">JJ</th>
      <th scope="col">JG</th>
      <th scope="col">JE</th>
      <th scope="col">JP</th>
      <th scope="col">GF</th>
      <th scope="col">GC</th>
      <th scope="col">PT</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let t of data ?? []">
      <td>{{ t.name }}</td>
      <td>{{ t.jj }}</td>
      <td>{{ t.jg }}</td>
      <td>{{ t.je }}</td>
      <td>{{ t.jp }}</td>
      <td>{{ t.gf }}</td>
      <td>{{ t.gc }}</td>
      <td>{{ t.pt }}</td>
    </tr>
  </tbody>
</table>
