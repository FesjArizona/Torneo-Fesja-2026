<header class="topbar d-flex align-items-center justify-content-between">

  <div class="d-flex align-items-center gap-3">

    <!-- Botón hamburguesa (solo mobile/tablet) -->
    <button class="topbar__hamburger d-xl-none" type="button" data-bs-toggle="offcanvas"
      data-bs-target="#sidebarOffcanvas" aria-controls="sidebarOffcanvas" aria-label="Abrir menú">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="#0a1622" d="M3.75 6.5a.75.75 0 0 1 .75-.75h15a.75.75 0 0 1 0 1.5h-15a.75.75 0 0 1-.75-.75m0 5.5a.75.75 0 0 1 .75-.75h15a.75.75 0 0 1 0 1.5h-15a.75.75 0 0 1-.75-.75m0 5.5a.75.75 0 0 1 .75-.75h15a.75.75 0 0 1 0 1.5h-15a.75.75 0 0 1-.75-.75"/></svg>
      <!-- <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg> -->
    </button>

    <!-- Page Title -->
    <div class="topbar__title">
      <h1 class="topbar__heading mb-0">{{ pageTitle }}</h1>
      <span *ngIf="pageBreadcrumb" class="topbar__breadcrumb">{{ pageBreadcrumb }}</span>
    </div>

  </div>

  <!-- Right Section -->
  <div class="topbar__right d-flex align-items-center gap-3">

    <!-- <div class="topbar__search d-none d-md-flex align-items-center gap-2">
      <span class="topbar__search-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      </span>
      <input type="text" class="topbar__search-input" placeholder="Search anything..." [(ngModel)]="searchQuery" />
    </div> -->

    <!-- <button class="topbar__icon-btn" aria-label="Notifications">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
      <span *ngIf="hasNotifications" class="topbar__badge"></span>
    </button> -->

    <div class="topbar__user d-flex align-items-center gap-2">
      
      <div class="topbar__user-info d-none d-md-block">
        <p class="topbar__user-name mb-0">{{ user.name }}</p>
        <p class="topbar__user-role mb-0">{{ user.role }}</p>
      </div>
    </div>

    <button class="topbar__icon-btn topbar__icon-btn--logout" aria-label="Logout">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
    </button>

  </div>
</header>
