<div class="login-container d-flex align-items-center justify-content-center">
  <div class="login-card shadow-lg wrapper fadeInDown">

    <div class="text-center mb-4">
      <h3 class="fw-bold">Sign in to Sports Tournaments</h3>
      <p class="text-muted">Please login to your account</p>
    </div>

    <form>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control custom-input" placeholder="example@email.com">
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control custom-input" placeholder="••••••••">
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <input type="checkbox" id="remember">
          <label for="remember" class="ms-1 small">Remember me</label>
        </div>
        <a href="#" class="small link-custom">Forgot your password?</a>
      </div>
      
      <button type="submit" class="btn btn-login w-100">
        Login
      </button>
    </form>

  </div>
</div>
