<div class="bracket-page">
  <div class="header mb-4 px-5 pt-4 d-flex align-items-center">
    <div class="logo-circle shadow-sm me-3">⚽</div>
    <h2 class="fw-bolder mb-0 text-dark">Torneo Doble Eliminatoria</h2>
  </div>

  <div class="bracket-container p-4 overflow-auto custom-scrollbar">
    <div class="full-bracket position-relative" #bracketContainer>

      <!-- SVG overlay for dynamic D3.js lines -->
      <svg class="bracket-lines-overlay" #linesOverlay></svg>

      <!-- ============================================ -->
      <!--            WINNER'S BRACKET                  -->
      <!-- ============================================ -->
      <div class="ms-5 section-label">Winner's Bracket</div>
      <div class="bracket-row winners-bracket justify-content-center">

        <!-- WR1: 4 matches -->
        <div class="round gap-4">
          <div class="round-title">RONDA 1</div>
          <div class="match-pair flex-grow-1 gap-4">
            <div class="match-node flex-grow-1" *ngFor="let m of bracket.winners[0].slice(0,2)">
              <div class="card-wrapper" [id]="'node-' + m.id">
                <app-match-card [match]="m" (teamAdvanced)="onTeamAdvanced($event)"></app-match-card>
              </div>
            </div>
          </div>
          <div class="match-pair flex-grow-1 gap-4">
            <div class="match-node flex-grow-1" *ngFor="let m of bracket.winners[0].slice(2,4)">
              <div class="card-wrapper" [id]="'node-' + m.id">
                <app-match-card [match]="m" (teamAdvanced)="onTeamAdvanced($event)"></app-match-card>
              </div>
            </div>
          </div>
        </div>

        <div class="spacer-col"></div>

        <!-- WR2: 2 matches -->
        <div class="round">
          <div class="round-title">RONDA 2</div>
          <div class="match-pair flex-grow-1">
            <div class="match-node flex-grow-1" *ngFor="let m of bracket.winners[1]">
              <div class="card-wrapper" [id]="'node-' + m.id">
                <app-match-card [match]="m" (teamAdvanced)="onTeamAdvanced($event)"></app-match-card>
              </div>
            </div>
          </div>
        </div>

        <div class="spacer-col"></div>

        <!-- WR3: 1 match (Winner's Final) -->
        <div class="round">
          <div class="round-title">FINAL GANADORES</div>
          <div class="match-pair flex-grow-1 align-items-center justify-content-center">
            <div class="match-node">
              <div class="card-wrapper" [id]="'node-' + bracket.winners[2][0].id">
                <app-match-card [match]="bracket.winners[2][0]"
                  (teamAdvanced)="onTeamAdvanced($event)"></app-match-card>
              </div>
            </div>
          </div>
        </div>

        <div class="spacer-col"></div>

        <!-- Championship -->
        <div class="round">
          <div class="round-title">CAMPEONATO</div>
          <div class="match-pair flex-grow-1 align-items-center justify-content-center">
            <div class="match-node flex-column">
              <div class="card-wrapper" [id]="'node-' + bracket.championship[0].id">
                <app-match-card [match]="bracket.championship[0]"
                  (teamAdvanced)="onTeamAdvanced($event)"></app-match-card>
              </div>
              <div class="reset-label text-muted small mt-3 text-center" *ngIf="bracket.championship[1]">
                <div class="card-wrapper mt-3" [id]="'node-' + bracket.championship[1].id">
                  <app-match-card [match]="bracket.championship[1]"
                    (teamAdvanced)="onTeamAdvanced($event)"></app-match-card>
                </div>
                <span class="fst-italic">If 1st Loss</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ============================================ -->
      <!--            LOSER'S BRACKET                   -->
      <!-- ============================================ -->
      <div class="ms-5 mt-5 section-label loser-label">Loser's Bracket</div>
      <div class="bracket-row losers-bracket justify-content-center">

        <!-- LR1: 2 matches -->
        <div class="round">
          <div class="round-title">RONDA L1</div>
          <div class="match-pair flex-grow-1 gap-4">
            <div class="match-node flex-grow-1" *ngFor="let m of bracket.losers[0]">
              <div class="card-wrapper" [id]="'node-' + m.id">
                <app-match-card [match]="m" (teamAdvanced)="onTeamAdvanced($event)"></app-match-card>
              </div>
            </div>
          </div>
        </div>

        <div class="spacer-col"></div>

        <!-- LR2: 2 matches -->
        <div class="round">
          <div class="round-title">RONDA L2</div>
          <div class="match-pair flex-grow-1 gap-4">
            <div class="match-node flex-grow-1" *ngFor="let m of bracket.losers[1]">
              <div class="card-wrapper" [id]="'node-' + m.id">
                <app-match-card [match]="m" (teamAdvanced)="onTeamAdvanced($event)"></app-match-card>
              </div>
            </div>
          </div>
        </div>

        <div class="spacer-col"></div>

        <!-- LR3: 1 match -->
        <div class="round">
          <div class="round-title">RONDA L3</div>
          <div class="match-pair flex-grow-1 align-items-center justify-content-center">
            <div class="match-node">
              <div class="card-wrapper" [id]="'node-' + bracket.losers[2][0].id">
                <app-match-card [match]="bracket.losers[2][0]" (teamAdvanced)="onTeamAdvanced($event)"></app-match-card>
              </div>
            </div>
          </div>
        </div>

        <div class="spacer-col"></div>

        <!-- LR4: 1 match -->
        <div class="round">
          <div class="round-title">RONDA L4</div>
          <div class="match-pair flex-grow-1 align-items-center justify-content-center">
            <div class="match-node">
              <div class="card-wrapper" [id]="'node-' + bracket.losers[3][0].id">
                <app-match-card [match]="bracket.losers[3][0]" (teamAdvanced)="onTeamAdvanced($event)"></app-match-card>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
