<div class="card border-0 container rounded-3 shadow-sm">
  <div class="card-body">

    <h6 class="fw-semibold mb-3">Tabla de Posiciones</h6>

    <div class="tabla-wrapper">
      <table class="table table-hover align-middle mb-0 tabla-scroll">
        <thead>
          <tr>
            <th class="sticky-col col-pos">#</th>
            <th class="sticky-col col-team">Equipo</th>
            <th class="text-center">PJ</th>
            <th class="text-center">G</th>
            <th class="text-center">E</th>
            <th class="text-center">P</th>
            <th class="text-center">GF</th>
            <th class="text-center">GC</th>
            <th class="text-center">DIF</th>
            <th class="text-end">PTS</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let team of standings; let i = index">

            <td class="sticky-col col-pos">
              {{ i + 1 }}
            </td>

            <td class="sticky-col col-team">
              {{ team.name }}
            </td>

            <td class="text-center">{{ team.pj }}</td>
            <td class="text-center">{{ team.g }}</td>
            <td class="text-center">{{ team.e }}</td>
            <td class="text-center">{{ team.p }}</td>
            <td class="text-center">{{ team.gf }}</td>
            <td class="text-center">{{ team.gc }}</td>

            <td class="text-center">
              {{ team.dif > 0 ? '+' + team.dif : team.dif }}
            </td>

            <td class="text-end fw-semibold">
              {{ team.pts }}
            </td>

          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
